<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    html,body{margin:0;padding:0;}
    body{background:#E7E3DA;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
  </style>
</helmet>

<div style="min-height:100vh;background:#E7E3DA;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:52px 24px;box-sizing:border-box;font-family:'Hanken Grotesk',sans-serif;">

  <div style="text-align:center;">
    <div style="font:700 11px/1 'Hanken Grotesk',sans-serif;letter-spacing:.26em;text-transform:uppercase;color:#9A927F;margin-bottom:11px;">Noll33 · Screentryck-mockup</div>
    <h1 style="font:800 clamp(24px,3vw,34px)/1.04 'Hanken Grotesk',sans-serif;letter-spacing:-.025em;color:#26231E;margin:0;">Tryck på bröstet</h1>
  </div>

  <div style="position:relative;width:min(980px,100%);aspect-ratio:16 / 9;border-radius:14px;overflow:hidden;background:#d8cfc2;box-shadow:0 34px 74px -26px rgba(40,34,26,.5),0 1px 0 rgba(255,255,255,.45) inset;">
    <video src="uploads/6787106-uhd_3840_2160_30fps-552133c2.mp4" autoplay muted loop playsinline ref="{{ videoRef }}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;"></video>
    <img src="assets/print-moon.png" ref="{{ printRef }}" alt="" style="position:absolute;left:0;top:0;width:1px;height:1px;opacity:0;pointer-events:none;" />
    <canvas ref="{{ canvasRef }}" style="position:absolute;inset:0;width:100%;height:100%;display:block;"></canvas>
  </div>

  <div style="font:500 13px/1.6 'Hanken Grotesk',sans-serif;color:#9A927F;text-align:center;max-width:60ch;">Trycket komponeras på duk med multiply-blandning — tygets veck och skuggor syns igenom som på ett riktigt screentryck, och de ljusa/creme-ytorna i motivet är urstansade så tröjan lyser igenom. Justera storlek, placering och blandning i Tweaks.</div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;printScale&quot;: {&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:15,&quot;min&quot;:8,&quot;max&quot;:40,&quot;step&quot;:0.5,&quot;unit&quot;:&quot;%&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Placering&quot;},
  &quot;posX&quot;: {&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:41,&quot;min&quot;:25,&quot;max&quot;:75,&quot;step&quot;:0.1,&quot;unit&quot;:&quot;%&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Placering&quot;},
  &quot;posY&quot;: {&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:49,&quot;min&quot;:25,&quot;max&quot;:72,&quot;step&quot;:0.1,&quot;unit&quot;:&quot;%&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Placering&quot;},
  &quot;blend&quot;: {&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;multiply&quot;,&quot;options&quot;:[&quot;multiply&quot;,&quot;normal&quot;,&quot;overlay&quot;,&quot;darken&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Utseende&quot;},
  &quot;opacity&quot;: {&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:0.96,&quot;min&quot;:0.4,&quot;max&quot;:1,&quot;step&quot;:0.02,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Utseende&quot;}
}">
class Component extends DCLogic {
  canvasRef = (n) => { this._canvas = n; };
  printRef = (n) => { this._print = n; };

  videoRef = (n) => {
    if (!n) return;
    this._video = n;
    const KEY = 'n33mockup2_t';
    const restore = () => {
      try {
        const t = parseFloat(localStorage.getItem(KEY) || '0');
        if (t > 0 && isFinite(n.duration) && t < n.duration - 0.1) n.currentTime = t;
      } catch (e) {}
      const p = n.play && n.play();
      if (p && p.catch) p.catch(() => {});
    };
    if (n.readyState >= 1) restore();
    else n.addEventListener('loadedmetadata', restore, { once: true });
    if (!n._tbound) {
      n._tbound = true;
      n.addEventListener('timeupdate', () => {
        try { localStorage.setItem(KEY, String(n.currentTime)); } catch (e) {}
      });
    }
  };

  componentDidMount() {
    this._resize();
    if (!this._ro && this._canvas && window.ResizeObserver) {
      this._ro = new ResizeObserver(() => this._resize());
      this._ro.observe(this._canvas);
    }
    this._loop();
  }

  componentWillUnmount() {
    if (this._raf) cancelAnimationFrame(this._raf);
    if (this._ro) this._ro.disconnect();
  }

  _resize() {
    const c = this._canvas;
    if (!c) return;
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const w = c.clientWidth, h = c.clientHeight;
    if (!w || !h) return;
    c.width = Math.round(w * dpr);
    c.height = Math.round(h * dpr);
    this._dpr = dpr; this._cssW = w; this._cssH = h;
  }

  _loop() {
    this._raf = requestAnimationFrame(() => this._loop());
    this._draw();
  }

  _draw() {
    const c = this._canvas, v = this._video, img = this._print;
    if (!c) return;
    const ctx = c.getContext('2d');
    const dpr = this._dpr || 1;
    const W = this._cssW || c.clientWidth, H = this._cssH || c.clientHeight;
    if (!W || !H) return;
    ctx.save();
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, W, H);

    // video, cover-fit
    if (v && v.videoWidth) {
      const vr = v.videoWidth / v.videoHeight, cr = W / H;
      let dw, dh, dx, dy;
      if (vr > cr) { dh = H; dw = H * vr; dx = (W - dw) / 2; dy = 0; }
      else { dw = W; dh = W / vr; dx = 0; dy = (H - dh) / 2; }
      try { ctx.drawImage(v, dx, dy, dw, dh); } catch (e) {}
    } else {
      ctx.fillStyle = '#d8cfc2'; ctx.fillRect(0, 0, W, H);
    }

    // print (image), multiply so fabric folds/shadows read through the ink
    const p = this.props || {};
    if (img && img.complete && img.naturalWidth) {
      const scale = p.printScale != null ? p.printScale : 15;
      const posX = p.posX != null ? p.posX : 42;
      const posY = p.posY != null ? p.posY : 49;
      const op = p.opacity != null ? p.opacity : 0.96;
      const blendMap = { multiply: 'multiply', normal: 'source-over', overlay: 'overlay', darken: 'darken' };
      const gco = blendMap[p.blend || 'multiply'] || 'multiply';
      const pw = W * scale / 100;
      const ph = pw * (img.naturalHeight / img.naturalWidth);
      const cx = W * posX / 100, cy = H * posY / 100;
      ctx.globalAlpha = op;
      ctx.globalCompositeOperation = gco;
      try { ctx.drawImage(img, cx - pw / 2, cy - ph / 2, pw, ph); } catch (e) {}
      ctx.globalCompositeOperation = 'source-over';
      ctx.globalAlpha = 1;
    }
    ctx.restore();
  }

  renderVals() {
    return { videoRef: this.videoRef, canvasRef: this.canvasRef, printRef: this.printRef };
  }
}
</script>
</body>
</html>
